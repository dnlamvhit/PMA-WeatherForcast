version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: weather-backend
    ports:
      - "8888:8888"
    environment:
      - DATABASE_URL=sqlite:///./weather.db
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
      - backend_db:/app/data
    networks:
      - weather-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/api/locations" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: weather-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8888
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - weather-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_db:
    driver: local

networks:
  weather-network:
    driver: bridge
