version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: weather-backend
    ports:
      - "8888:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/weather.db
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app/backend
      - ./requirements.txt:/app/requirements.txt
      - backend_db:/app/data
    networks:
      - weather-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/locations" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: weather-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8888
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - weather-network
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  backend_db:
    driver: local

networks:
  weather-network:
    driver: bridge
